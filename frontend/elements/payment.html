<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusPay Payment Element</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: transparent; }
    
    .payment-container { padding: 8px; }
    
    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid #e5e7eb; margin-bottom: 16px; }
    .tab { 
      padding: 10px 16px; 
      font-size: 14px; 
      color: #6b7280; 
      cursor: pointer; 
      border-bottom: 2px solid transparent; 
      margin-bottom: -1px; 
    }
    .tab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .tab:hover { color: #4f46e5; }
    
    /* Accordion */
    .accordion { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .accordion-item { border-bottom: 1px solid #e5e7eb; }
    .accordion-item:last-child { border-bottom: none; }
    .accordion-header { 
      display: flex; 
      align-items: center; 
      padding: 12px 16px; 
      cursor: pointer; 
      background: white; 
    }
    .accordion-header:hover { background: #f9fafb; }
    .accordion-icon { width: 24px; height: 24px; margin-right: 12px; }
    .accordion-title { flex: 1; font-size: 14px; font-weight: 500; }
    .accordion-arrow { transition: transform 0.2s; }
    .accordion-item.open .accordion-arrow { transform: rotate(180deg); }
    .accordion-content { display: none; padding: 16px; background: #f9fafb; }
    .accordion-item.open .accordion-content { display: block; }
    
    /* Card form */
    .card-form { display: flex; flex-direction: column; gap: 12px; }
    .field label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    .field input { 
      width: 100%; 
      height: 40px; 
      padding: 0 12px; 
      font-size: 15px; 
      border: 1px solid #d1d5db; 
      border-radius: 6px; 
      outline: none; 
    }
    .field input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }
    
    /* APM buttons */
    .apm-button { 
      width: 100%; 
      height: 44px; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 15px; 
      font-weight: 500; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px; 
      margin-bottom: 8px; 
    }
    .apm-button:last-child { margin-bottom: 0; }
    .apm-button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="payment-container" id="container"></div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const methods = (params.get('methods') || 'card').split(',');
      const layout = params.get('layout') || 'tabs';
      const amount = parseInt(params.get('amount') || '0');
      const currency = params.get('currency') || 'usd';

      const container = document.getElementById('container');
      let selectedMethod = methods[0];

      // Render based on layout
      if (layout === 'tabs') {
        renderTabs();
      } else {
        renderAccordion();
      }

      function renderTabs() {
        const tabsHtml = methods.map((m, i) => 
          `<div class="tab ${i === 0 ? 'active' : ''}" data-method="${m}">${getMethodName(m)}</div>`
        ).join('');

        container.innerHTML = `
          <div class="tabs">${tabsHtml}</div>
          <div id="method-content"></div>
        `;

        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            selectedMethod = tab.dataset.method;
            renderMethodContent();
            sendToParent('nexuspay:payment_method_selected', { method: selectedMethod });
          });
        });

        renderMethodContent();
      }

      function renderAccordion() {
        const itemsHtml = methods.map((m, i) => `
          <div class="accordion-item ${i === 0 ? 'open' : ''}" data-method="${m}">
            <div class="accordion-header">
              <div class="accordion-icon">${getMethodIcon(m)}</div>
              <div class="accordion-title">${getMethodName(m)}</div>
              <svg class="accordion-arrow" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M4 6l4 4 4-4"/>
              </svg>
            </div>
            <div class="accordion-content"></div>
          </div>
        `).join('');

        container.innerHTML = `<div class="accordion">${itemsHtml}</div>`;

        document.querySelectorAll('.accordion-header').forEach(header => {
          header.addEventListener('click', () => {
            const item = header.parentElement;
            document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('open'));
            item.classList.add('open');
            selectedMethod = item.dataset.method;
            renderAccordionContent(item);
            sendToParent('nexuspay:payment_method_selected', { method: selectedMethod });
          });
        });

        renderAccordionContent(document.querySelector('.accordion-item'));
      }

      function renderMethodContent() {
        const content = document.getElementById('method-content');
        content.innerHTML = getMethodContent(selectedMethod);
        attachCardListeners();
      }

      function renderAccordionContent(item) {
        const content = item.querySelector('.accordion-content');
        const method = item.dataset.method;
        content.innerHTML = getMethodContent(method);
        attachCardListeners();
      }

      function getMethodContent(method) {
        switch (method) {
          case 'card':
            return `
              <div class="card-form">
                <div class="field">
                  <label>卡号</label>
                  <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                </div>
                <div class="field-row">
                  <div class="field">
                    <label>有效期</label>
                    <input type="text" id="expiry" placeholder="MM / YY" maxlength="7">
                  </div>
                  <div class="field">
                    <label>CVC</label>
                    <input type="text" id="cvc" placeholder="123" maxlength="4">
                  </div>
                </div>
              </div>
            `;
          case 'alipay':
            return `<button class="apm-button" style="background: #1677FF; color: white;" onclick="startAlipay()">支付宝支付</button>`;
          case 'wechat_pay':
            return `<button class="apm-button" style="background: #07C160; color: white;" onclick="startWeChatPay()">微信支付</button>`;
          case 'apple_pay':
            return `<button class="apm-button" style="background: #000; color: white;" onclick="startApplePay()">Apple Pay</button>`;
          case 'google_pay':
            return `<button class="apm-button" style="background: #4285f4; color: white;" onclick="startGooglePay()">Google Pay</button>`;
          default:
            return '<p style="color: #6b7280;">暂不支持此支付方式</p>';
        }
      }

      function getMethodName(method) {
        const names = {
          card: '银行卡',
          alipay: '支付宝',
          wechat_pay: '微信支付',
          apple_pay: 'Apple Pay',
          google_pay: 'Google Pay'
        };
        return names[method] || method;
      }

      function getMethodIcon(method) {
        const colors = { card: '#6366f1', alipay: '#1677FF', wechat_pay: '#07C160', apple_pay: '#000', google_pay: '#4285f4' };
        return `<div style="width:24px;height:24px;background:${colors[method] || '#666'};border-radius:4px;"></div>`;
      }

      function attachCardListeners() {
        const cardNumber = document.getElementById('cardNumber');
        const expiry = document.getElementById('expiry');
        const cvc = document.getElementById('cvc');

        if (cardNumber) {
          cardNumber.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\s/g, '').replace(/\D/g, '').substring(0, 16);
            e.target.value = v.replace(/(\d{4})(?=\d)/g, '$1 ');
            emitChange();
          });
        }
        if (expiry) {
          expiry.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length >= 2) v = v.substring(0, 2) + ' / ' + v.substring(2, 4);
            e.target.value = v;
            emitChange();
          });
        }
        if (cvc) {
          cvc.addEventListener('input', emitChange);
        }
      }

      function isComplete() {
        if (selectedMethod !== 'card') return true;
        const cardNumber = document.getElementById('cardNumber')?.value.replace(/\s/g, '') || '';
        const expiry = document.getElementById('expiry')?.value || '';
        const cvc = document.getElementById('cvc')?.value || '';
        return cardNumber.length >= 13 && expiry.length === 7 && cvc.length >= 3;
      }

      function emitChange() {
        sendToParent('nexuspay:change', { complete: isComplete(), method: selectedMethod });
      }

      function sendToParent(type, payload = {}) {
        window.parent.postMessage({ type, payload }, '*');
      }

      // Handle tokenize request
      window.addEventListener('message', async (event) => {
        if (event.data.type === 'nexuspay:tokenize') {
          if (selectedMethod === 'card') {
            const cardNumber = document.getElementById('cardNumber')?.value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry')?.value.match(/(\d{2})\s*\/\s*(\d{2})/);
            const cvc = document.getElementById('cvc')?.value;

            if (!isComplete()) {
              sendToParent('nexuspay:tokenize:error', { error: { message: '请完成卡片信息' } });
              return;
            }

            // Send to backend for tokenization
            sendToParent('nexuspay:tokenize:success', { 
              token: `card_${Date.now()}`,
              method: 'card',
              card: { last4: cardNumber.slice(-4), brand: 'VISA' }
            });
          } else {
            sendToParent('nexuspay:tokenize:success', { token: `${selectedMethod}_${Date.now()}`, method: selectedMethod });
          }
        }
      });

      // Ready
      sendToParent('nexuspay:ready');
    })();
  </script>
</body>
</html>
