server:
  port: 8080

spring:
  application:
    name: nexuspay

  datasource:
    url: jdbc:postgresql://localhost:5432/nexuspay
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # Redis (optional - disabled by default, enable when Redis is available)
  redis:
    enabled: false
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2

jwt:
  secret: 
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

security:
  encryption:
    key: 
  vault:
    master-key: 
    custodian-key: 
    key-id: local-v1

logging:
  level:
    com.nexuspay: DEBUG
    org.springframework.security: INFO

# ---- v1.3.0 Observability ----

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: nexuspay
  tracing:
    sampling:
      probability: 1.0
